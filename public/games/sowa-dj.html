<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Sowa DJ — majasieuczy.pl</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Baloo+2:wght@400;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: 'Fredoka', sans-serif;
    background: #0a0118;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }

  canvas { display: block; }

  #ui-layer {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 10;
  }

  #hud {
    position: absolute;
    top: 10px; left: 10px; right: 10px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  .hud-box {
    background: rgba(10, 1, 24, 0.8);
    backdrop-filter: blur(10px);
    border-radius: 14px;
    padding: 8px 16px;
    color: white;
    font-family: 'Baloo 2', sans-serif;
    font-size: 16px;
    font-weight: 600;
    border: 2px solid rgba(236, 72, 153, 0.3);
  }

  #combo-display {
    position: absolute;
    top: 55px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Baloo 2', sans-serif;
    font-size: 28px;
    font-weight: 800;
    color: #f9a8d4;
    text-shadow: 0 0 20px rgba(236, 72, 153, 0.6);
    opacity: 0;
    transition: all 0.2s;
    white-space: nowrap;
  }

  #combo-display.visible {
    opacity: 1;
    animation: comboPop 0.3s ease;
  }

  @keyframes comboPop {
    0% { transform: translateX(-50%) scale(0.5); }
    60% { transform: translateX(-50%) scale(1.2); }
    100% { transform: translateX(-50%) scale(1); }
  }

  #word-bar {
    position: absolute;
    top: 90px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 6px;
  }

  .word-letter {
    width: 36px; height: 42px;
    background: rgba(10, 1, 24, 0.8);
    border: 2px solid rgba(167, 139, 250, 0.2);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Baloo 2', sans-serif;
    font-size: 20px;
    font-weight: 800;
    color: rgba(167, 139, 250, 0.3);
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .word-letter.got {
    color: #c084fc;
    border-color: #a78bfa;
    background: rgba(167, 139, 250, 0.2);
    box-shadow: 0 0 12px rgba(167, 139, 250, 0.3);
    transform: scale(1.1);
  }

  #tap-zones {
    position: absolute;
    bottom: 0;
    left: 0; right: 0;
    height: calc(100px + env(safe-area-inset-bottom, 0px));
    padding-bottom: env(safe-area-inset-bottom, 0px);
    display: flex;
    align-items: flex-start;
    pointer-events: auto;
  }

  .tap-zone {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .tap-label {
    width: 60px; height: 60px;
    border-radius: 50%;
    border: 3px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.05);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Baloo 2', sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: rgba(255,255,255,0.4);
    transition: all 0.1s;
    pointer-events: none;
  }

  .tap-zone:active .tap-label,
  .tap-zone.pressed .tap-label {
    transform: scale(0.85);
    background: rgba(255,255,255,0.2);
    border-color: rgba(255,255,255,0.5);
  }

  .hit-text {
    position: fixed;
    font-family: 'Baloo 2', sans-serif;
    font-weight: 800;
    font-size: 32px;
    pointer-events: none;
    z-index: 30;
    animation: hitFloat 0.8s ease forwards;
  }

  @keyframes hitFloat {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-60px) scale(1.3); }
  }

  #screen-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 200;
    pointer-events: auto;
    background: radial-gradient(ellipse at center bottom, #1a0533 0%, #0a0118 70%);
  }

  #screen-overlay.hidden { display: none; }

  #screen-overlay h1 {
    font-family: 'Baloo 2', sans-serif;
    font-size: 42px;
    color: white;
    text-align: center;
    text-shadow: 0 0 30px rgba(236, 72, 153, 0.5);
  }

  #screen-overlay .subtitle {
    font-size: 18px;
    color: #f9a8d4;
    margin-bottom: 24px;
    text-align: center;
    padding: 0 20px;
  }

  .big-icon {
    font-size: 80px;
    margin-bottom: 16px;
    animation: djBounce 1s ease-in-out infinite;
  }

  @keyframes djBounce {
    0%, 100% { transform: translateY(0) rotate(-5deg); }
    50% { transform: translateY(-12px) rotate(5deg); }
  }

  .start-btn {
    padding: 16px 44px;
    border-radius: 18px;
    border: 3px solid rgba(236, 72, 153, 0.4);
    background: linear-gradient(135deg, #ec4899, #be185d);
    color: white;
    font-family: 'Baloo 2', sans-serif;
    font-size: 22px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 8px 30px rgba(236, 72, 153, 0.3);
    -webkit-tap-highlight-color: transparent;
    margin-top: 12px;
  }

  .start-btn:hover { transform: scale(1.05); }

  .back-btn-overlay {
    padding: 10px 28px;
    border-radius: 14px;
    border: 2px solid rgba(236, 72, 153, 0.2);
    background: rgba(236, 72, 153, 0.08);
    color: #f9a8d4;
    font-family: 'Baloo 2', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    margin-top: 8px;
  }

  #level-info {
    color: #c084fc;
    font-size: 15px;
    margin-bottom: 16px;
    font-family: 'Baloo 2', sans-serif;
  }

  .stars { font-size: 36px; margin-bottom: 10px; letter-spacing: 6px; }

  .key-hint {
    color: rgba(255,255,255,0.4);
    font-size: 13px;
    margin-top: 16px;
    font-family: 'Baloo 2', sans-serif;
  }

  #back-corner {
    position: fixed;
    bottom: calc(110px + env(safe-area-inset-bottom, 0px));
    right: 12px;
    z-index: 20;
    pointer-events: auto;
    padding: 10px 18px;
    border-radius: 14px;
    border: 2px solid rgba(236, 72, 153, 0.25);
    background: rgba(10, 1, 24, 0.8);
    backdrop-filter: blur(8px);
    color: #f9a8d4;
    font-family: 'Baloo 2', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
</style>
</head>
<body>

<div id="screen-overlay">
  <div class="big-icon">🦉🎧</div>
  <h1>Sowa DJ</h1>
  <div class="subtitle">Łap literki w rytm muzyki!<br>Ułóż słowo zanim piosenka się skończy!</div>
  <div id="level-info">Poziom 1 — Słowo do ułożenia</div>
  <button class="start-btn" id="start-btn">🎵 Start!</button>
  <button class="back-btn-overlay" onclick="goBack()">← Wróć do menu</button>
  <div class="key-hint">Klawisze: A / S / D lub dotyk</div>
</div>

<canvas id="game"></canvas>

<div id="ui-layer">
  <div id="hud">
    <div class="hud-box">⭐ <span id="score">0</span></div>
    <div class="hud-box">🎵 Lvl <span id="level-num">1</span></div>
    <div class="hud-box">❤️ ×<span id="lives">5</span></div>
  </div>
  <div id="combo-display"></div>
  <div id="word-bar"></div>
</div>

<div id="tap-zones">
  <div class="tap-zone" id="zone-0"><div class="tap-label">A</div></div>
  <div class="tap-zone" id="zone-1"><div class="tap-label">S</div></div>
  <div class="tap-zone" id="zone-2"><div class="tap-label">D</div></div>
</div>

<button id="back-corner" onclick="goBack()">← Wróć</button>

<script>
function goBack() {
  window.parent.postMessage({ type: 'sowadj:back' }, '*');
}

// ============================================================
// 🦉🎧 SOWA DJ — Rhythm Game Engine
// ============================================================

const WORDS = [
  ["KOT","LAS","DOM","NOS","MAK","LIS","RAK","PĄK"],
  ["SOWA","MAPA","RYBA","ŻABA","KOZA","LODY","MYSZ","KURA"],
  ["KWIAT","MORZE","ZAMEK","LAMPA","PTAKI","DRZEW","OBŁOK"],
  ["JABŁKO","KWIATY","ŚLIMAK","MOTYLE","MRÓWKA","DESZCZ"],
];

const LANE_COLORS = ["#ec4899", "#a78bfa", "#38bdf8"];
const LANE_GLOW = ["rgba(236,72,153,", "rgba(167,139,250,", "rgba(56,189,248,"];

// ============================================================
// AUDIO ENGINE (Web Audio API)
// ============================================================
let audioCtx = null;
let masterGain = null;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.4;
  masterGain.connect(audioCtx.destination);
}

function playKick() {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = "sine";
  osc.frequency.setValueAtTime(150, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(30, audioCtx.currentTime + 0.15);
  gain.gain.setValueAtTime(0.6, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
  osc.connect(gain);
  gain.connect(masterGain);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.2);
}

function playHihat() {
  if (!audioCtx) return;
  const bufferSize = audioCtx.sampleRate * 0.05;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * 0.3;
  const source = audioCtx.createBufferSource();
  source.buffer = buffer;
  const gain = audioCtx.createGain();
  const filter = audioCtx.createBiquadFilter();
  filter.type = "highpass";
  filter.frequency.value = 8000;
  gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.06);
  source.connect(filter);
  filter.connect(gain);
  gain.connect(masterGain);
  source.start();
}

function playSnare() {
  if (!audioCtx) return;
  const bufSize = audioCtx.sampleRate * 0.1;
  const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) d[i] = (Math.random() * 2 - 1);
  const noise = audioCtx.createBufferSource();
  noise.buffer = buf;
  const nGain = audioCtx.createGain();
  nGain.gain.setValueAtTime(0.25, audioCtx.currentTime);
  nGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
  const nFilter = audioCtx.createBiquadFilter();
  nFilter.type = "bandpass";
  nFilter.frequency.value = 3000;
  noise.connect(nFilter);
  nFilter.connect(nGain);
  nGain.connect(masterGain);
  noise.start();

  const osc = audioCtx.createOscillator();
  const oGain = audioCtx.createGain();
  osc.type = "triangle";
  osc.frequency.value = 200;
  oGain.gain.setValueAtTime(0.3, audioCtx.currentTime);
  oGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);
  osc.connect(oGain);
  oGain.connect(masterGain);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.1);
}

function playHitSound(perfect) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = "sine";
  osc.frequency.value = perfect ? 880 : 660;
  gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
  osc.connect(gain);
  gain.connect(masterGain);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.15);

  if (perfect) {
    const osc2 = audioCtx.createOscillator();
    const g2 = audioCtx.createGain();
    osc2.type = "sine";
    osc2.frequency.value = 1320;
    g2.gain.setValueAtTime(0.12, audioCtx.currentTime + 0.05);
    g2.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
    osc2.connect(g2);
    g2.connect(masterGain);
    osc2.start(audioCtx.currentTime + 0.05);
    osc2.stop(audioCtx.currentTime + 0.2);
  }
}

function playMissSound() {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = "square";
  osc.frequency.value = 120;
  gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
  osc.connect(gain);
  gain.connect(masterGain);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.2);
}

function playWordComplete() {
  if (!audioCtx) return;
  [523, 659, 784, 1047].forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = "sine";
    osc.frequency.value = freq;
    g.gain.setValueAtTime(0.2, audioCtx.currentTime + i * 0.12);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + i * 0.12 + 0.3);
    osc.connect(g); g.connect(masterGain);
    osc.start(audioCtx.currentTime + i * 0.12);
    osc.stop(audioCtx.currentTime + i * 0.12 + 0.3);
  });
}

// Beat sequencer
let beatStep = 0;
let lastBeatTime = 0;

function tickBeat(now) {
  if (!state.gameRunning) return;
  const bpm = 100 + state.level * 8;
  const interval = 60000 / bpm / 2;

  if (now - lastBeatTime >= interval) {
    lastBeatTime = now;
    const bar = beatStep % 8;

    if (bar === 0) playKick();
    if (bar === 4) { playKick(); playSnare(); }
    if (bar === 2 || bar === 6) playHihat();
    if (bar % 2 === 0) playHihat();

    beatStep++;
  }
}

// ============================================================
// STATE
// ============================================================
const state = {
  level: 1,
  score: 0,
  lives: 5,
  combo: 0,
  maxCombo: 0,
  word: "",
  collectedLetters: [],
  gameRunning: false,
  shakeAmount: 0,
  shakeDecay: 0.9,
};

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let W, H, LANE_W, HIT_Y;

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.visualViewport ? window.visualViewport.height : window.innerHeight;
  W = canvas.width;
  H = canvas.height;
  LANE_W = W / 3;
  // HIT_Y = top of tap-zones (100px tall, safe area padding handled by CSS)
  const tapEl = document.getElementById('tap-zones');
  const tapH = tapEl ? tapEl.offsetHeight : 100;
  HIT_Y = H - tapH - 10;
}
window.addEventListener("resize", resize);
if (window.visualViewport) window.visualViewport.addEventListener("resize", resize);
resize();

// ============================================================
// NOTES
// ============================================================
let notes = [];
let particles = [];
let nextNoteTime = 0;
let owlBob = 0;
let bgPulse = 0;

const POLISH_ALPHABET = "AĄBCĆDEĘFGHIJKLŁMNŃOÓPRSŚTUWYZŹŻ";

function spawnNote() {
  const lane = Math.floor(Math.random() * 3);
  const neededIdx = state.collectedLetters.indexOf(false);
  let char, isTarget;

  if (neededIdx !== -1 && Math.random() < 0.45) {
    char = state.word[neededIdx];
    isTarget = true;
  } else {
    char = POLISH_ALPHABET[Math.floor(Math.random() * POLISH_ALPHABET.length)];
    isTarget = state.word.includes(char) && !state.collectedLetters[state.word.indexOf(char)];
  }

  notes.push({
    lane,
    y: -60,
    char,
    isTarget,
    radius: 28,
    active: true,
    glowPhase: Math.random() * Math.PI * 2,
  });
}

function generateNotes() {
  const bpm = 100 + state.level * 8;
  const interval = 60000 / bpm;
  const noteInterval = interval * (state.level <= 2 ? 1.2 : state.level <= 4 ? 0.9 : 0.7);

  if (Date.now() > nextNoteTime) {
    spawnNote();
    nextNoteTime = Date.now() + noteInterval + Math.random() * 200;
  }
}

// ============================================================
// INPUT
// ============================================================
function tapLane(lane) {
  if (!state.gameRunning) return;

  let bestNote = null;
  let bestDist = Infinity;

  for (const n of notes) {
    if (!n.active || n.lane !== lane) continue;
    const dist = Math.abs(n.y - HIT_Y);
    if (dist < 60 && dist < bestDist) {
      bestDist = dist;
      bestNote = n;
    }
  }

  if (bestNote) {
    bestNote.active = false;
    const perfect = bestDist < 20;
    const great = bestDist < 35;

    if (bestNote.isTarget) {
      const idx = state.word.indexOf(bestNote.char);
      if (idx !== -1 && !state.collectedLetters[idx]) {
        state.collectedLetters[idx] = true;
      }
    }

    const points = perfect ? 100 : great ? 60 : 30;
    const multi = Math.min(1 + Math.floor(state.combo / 5), 4);
    state.score += points * multi;
    state.combo++;
    if (state.combo > state.maxCombo) state.maxCombo = state.combo;

    playHitSound(perfect);
    spawnHitParticles(lane, HIT_Y, perfect);
    showHitText(lane, perfect ? "SUPER!" : great ? "Dobrze!" : "OK", perfect ? "#fbbf24" : great ? "#a78bfa" : "#94a3b8");

    if (perfect) state.shakeAmount = 4;
    bgPulse = 1;

    updateUI();

    if (state.collectedLetters.every(Boolean)) {
      playWordComplete();
      state.score += 200 + state.level * 50;
      setTimeout(() => winLevel(), 1200);
    }
  } else {
    playMissSound();
    state.combo = 0;
    updateUI();
  }
}

window.addEventListener("keydown", e => {
  if (e.key === "a" || e.key === "A") tapLane(0);
  if (e.key === "s" || e.key === "S") tapLane(1);
  if (e.key === "d" || e.key === "D") tapLane(2);
});

for (let i = 0; i < 3; i++) {
  const zone = document.getElementById(`zone-${i}`);
  zone.addEventListener("touchstart", e => { e.preventDefault(); tapLane(i); zone.classList.add("pressed"); });
  zone.addEventListener("touchend", () => zone.classList.remove("pressed"));
  zone.addEventListener("mousedown", () => { tapLane(i); zone.classList.add("pressed"); });
  zone.addEventListener("mouseup", () => zone.classList.remove("pressed"));
}

// ============================================================
// PARTICLES
// ============================================================
function spawnHitParticles(lane, y, perfect) {
  const cx = lane * LANE_W + LANE_W / 2;
  const count = perfect ? 18 : 10;
  const color = LANE_COLORS[lane];

  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 * i) / count + Math.random() * 0.3;
    const speed = 2 + Math.random() * 4;
    particles.push({
      x: cx, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 2,
      life: 30 + Math.random() * 20,
      maxLife: 50,
      color,
      size: perfect ? 4 + Math.random() * 3 : 2 + Math.random() * 3,
      type: "circle",
    });
  }

  particles.push({
    x: cx, y,
    vx: 0, vy: 0,
    life: 20, maxLife: 20,
    color,
    size: 10,
    type: "ring",
    ringRadius: 5,
  });
}

function showHitText(lane, text, color) {
  const el = document.createElement("div");
  el.className = "hit-text";
  el.textContent = text;
  el.style.color = color;
  el.style.left = (lane * LANE_W + LANE_W / 2) + "px";
  el.style.top = (HIT_Y - 40) + "px";
  el.style.transform = "translateX(-50%)";
  el.style.textShadow = `0 0 15px ${color}`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 800);
}

// ============================================================
// UPDATE
// ============================================================
function update(now) {
  if (!state.gameRunning) return;

  tickBeat(now);
  generateNotes();

  const speed = 2.2 + state.level * 0.3;

  for (let i = notes.length - 1; i >= 0; i--) {
    const n = notes[i];
    if (!n.active) { notes.splice(i, 1); continue; }
    n.y += speed;

    if (n.y > HIT_Y + 80) {
      n.active = false;
      notes.splice(i, 1);

      if (n.isTarget) {
        state.lives--;
        state.combo = 0;
        playMissSound();
        state.shakeAmount = 6;
      }

      updateUI();
      if (state.lives <= 0) gameOver();
    }
  }

  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    if (p.type === "circle") p.vy += 0.1;
    if (p.type === "ring") p.ringRadius += 3;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }

  state.shakeAmount *= state.shakeDecay;
  if (state.shakeAmount < 0.1) state.shakeAmount = 0;
  bgPulse *= 0.92;
  owlBob = Math.sin(now * 0.004) * 5;
}

// ============================================================
// DRAW
// ============================================================
function draw(now) {
  ctx.save();

  if (state.shakeAmount > 0) {
    ctx.translate(
      (Math.random() - 0.5) * state.shakeAmount * 2,
      (Math.random() - 0.5) * state.shakeAmount * 2
    );
  }

  // Background
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  const pulseR = Math.floor(10 + bgPulse * 20);
  const pulseB = Math.floor(24 + bgPulse * 30);
  bg.addColorStop(0, `rgb(${pulseR}, 1, ${pulseB})`);
  bg.addColorStop(0.5, "#0a0118");
  bg.addColorStop(1, "#0f0225");
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // Disco lights
  for (let i = 0; i < 5; i++) {
    const angle = now * 0.001 + i * 1.2;
    const lx = W / 2 + Math.cos(angle) * W * 0.4;
    const grad = ctx.createRadialGradient(lx, 50, 0, lx, H * 0.5, H * 0.5);
    const hue = (i * 72 + now * 0.03) % 360;
    grad.addColorStop(0, `hsla(${hue}, 80%, 60%, ${0.04 + bgPulse * 0.04})`);
    grad.addColorStop(1, "transparent");
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
  }

  // Lane separators
  ctx.setLineDash([8, 12]);
  ctx.strokeStyle = "rgba(255,255,255,0.05)";
  ctx.lineWidth = 1;
  for (let i = 1; i < 3; i++) {
    ctx.beginPath();
    ctx.moveTo(i * LANE_W, 0);
    ctx.lineTo(i * LANE_W, H);
    ctx.stroke();
  }
  ctx.setLineDash([]);

  // Hit line
  ctx.strokeStyle = `rgba(255,255,255,${0.15 + bgPulse * 0.2})`;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, HIT_Y);
  ctx.lineTo(W, HIT_Y);
  ctx.stroke();

  // Hit zone glow
  for (let i = 0; i < 3; i++) {
    const cx = i * LANE_W + LANE_W / 2;
    const grad = ctx.createRadialGradient(cx, HIT_Y, 0, cx, HIT_Y, 50);
    grad.addColorStop(0, LANE_GLOW[i] + "0.12)");
    grad.addColorStop(1, LANE_GLOW[i] + "0)");
    ctx.fillStyle = grad;
    ctx.fillRect(cx - 50, HIT_Y - 50, 100, 100);
  }

  // Notes
  for (const n of notes) {
    if (!n.active) continue;
    const cx = n.lane * LANE_W + LANE_W / 2;
    const color = LANE_COLORS[n.lane];
    const glow = LANE_GLOW[n.lane];
    const pulse = 1 + Math.sin(now * 0.006 + n.glowPhase) * 0.1;

    // Trail
    const trailGrad = ctx.createLinearGradient(cx, n.y - 40, cx, n.y);
    trailGrad.addColorStop(0, glow + "0)");
    trailGrad.addColorStop(1, glow + "0.3)");
    ctx.fillStyle = trailGrad;
    ctx.fillRect(cx - 3, n.y - 40, 6, 40);

    ctx.shadowColor = color;
    ctx.shadowBlur = n.isTarget ? 20 : 10;

    ctx.fillStyle = n.isTarget ? color : "rgba(100,100,120,0.6)";
    ctx.beginPath();
    ctx.arc(cx, n.y, n.radius * pulse, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = "rgba(255,255,255,0.3)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(cx, n.y, n.radius * pulse - 6, 0, Math.PI * 2);
    ctx.stroke();

    ctx.shadowBlur = 0;

    ctx.fillStyle = n.isTarget ? "white" : "rgba(255,255,255,0.5)";
    ctx.font = `bold ${n.isTarget ? 22 : 18}px 'Baloo 2'`;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(n.char, cx, n.y + 1);

    if (n.isTarget) {
      ctx.fillStyle = "#fbbf24";
      ctx.font = "12px 'Baloo 2'";
      ctx.fillText("★", cx, n.y - n.radius - 8);
    }
  }

  // Particles
  for (const p of particles) {
    const alpha = p.life / p.maxLife;
    if (p.type === "ring") {
      ctx.strokeStyle = p.color;
      ctx.globalAlpha = alpha * 0.6;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.ringRadius, 0, Math.PI * 2);
      ctx.stroke();
    } else {
      ctx.globalAlpha = alpha;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  ctx.globalAlpha = 1;

  drawOwlDJ(W / 2, HIT_Y + 55 + owlBob, now);

  ctx.restore();
}

// ============================================================
// OWL DJ
// ============================================================
function drawOwlDJ(x, y, now) {
  ctx.save();
  ctx.translate(x, y);

  // Console/turntable
  ctx.fillStyle = "#1a1025";
  ctx.beginPath();
  ctx.roundRect(-70, 10, 140, 30, 8);
  ctx.fill();
  ctx.strokeStyle = "rgba(236,72,153,0.4)";
  ctx.lineWidth = 2;
  ctx.stroke();

  // Turntable discs
  const spinAngle = now * 0.003;
  for (let side = -1; side <= 1; side += 2) {
    ctx.save();
    ctx.translate(side * 35, 25);
    ctx.rotate(spinAngle * side);
    ctx.fillStyle = "#2a1f3a";
    ctx.beginPath();
    ctx.arc(0, 0, 14, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = "rgba(167,139,250,0.3)";
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.strokeStyle = "rgba(255,255,255,0.1)";
    ctx.beginPath(); ctx.arc(0, 0, 6, 0, Math.PI * 2); ctx.stroke();
    ctx.beginPath(); ctx.arc(0, 0, 10, 0, Math.PI * 2); ctx.stroke();
    ctx.fillStyle = LANE_COLORS[side === -1 ? 0 : 2];
    ctx.beginPath(); ctx.arc(0, 0, 3, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }

  // Fader
  const faderX = Math.sin(now * 0.002) * 10;
  ctx.fillStyle = "#a78bfa";
  ctx.fillRect(faderX - 4, 18, 8, 14);

  // LED dots
  for (let i = 0; i < 7; i++) {
    const ledOn = Math.sin(now * 0.01 + i * 0.8) > 0;
    ctx.fillStyle = ledOn ? "#ec4899" : "#2a1f3a";
    ctx.beginPath();
    ctx.arc(-30 + i * 10, 14, 2, 0, Math.PI * 2);
    ctx.fill();
  }

  // Body
  const bodyBob = Math.sin(now * 0.004) * 2;
  ctx.fillStyle = "#c4956a";
  ctx.beginPath();
  ctx.ellipse(0, -8 + bodyBob, 18, 22, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = "#f5deb3";
  ctx.beginPath();
  ctx.ellipse(0, -2 + bodyBob, 11, 14, 0, 0, Math.PI * 2);
  ctx.fill();

  // Wings
  const wingBounce = Math.sin(now * 0.008) * 0.4;
  ctx.fillStyle = "#a67c52";
  ctx.save();
  ctx.translate(-16, -6 + bodyBob);
  ctx.rotate(-0.3 + wingBounce);
  ctx.beginPath();
  ctx.ellipse(0, 0, 8, 14, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
  ctx.save();
  ctx.translate(16, -6 + bodyBob);
  ctx.rotate(0.3 - wingBounce);
  ctx.beginPath();
  ctx.ellipse(0, 0, 8, 14, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // Head
  ctx.fillStyle = "#c4956a";
  ctx.beginPath();
  ctx.arc(0, -26 + bodyBob, 14, 0, Math.PI * 2);
  ctx.fill();

  // Ear tufts
  ctx.fillStyle = "#a67c52";
  ctx.beginPath(); ctx.moveTo(-8, -36 + bodyBob); ctx.lineTo(-5, -44 + bodyBob); ctx.lineTo(-2, -34 + bodyBob); ctx.fill();
  ctx.beginPath(); ctx.moveTo(8, -36 + bodyBob); ctx.lineTo(5, -44 + bodyBob); ctx.lineTo(2, -34 + bodyBob); ctx.fill();

  // Headphones
  ctx.strokeStyle = "#4a4a6a";
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.arc(0, -30 + bodyBob, 16, -2.8, -0.3);
  ctx.stroke();
  ctx.fillStyle = "#ec4899";
  ctx.beginPath();
  ctx.roundRect(-18, -30 + bodyBob, 8, 12, 3);
  ctx.fill();
  ctx.beginPath();
  ctx.roundRect(10, -30 + bodyBob, 8, 12, 3);
  ctx.fill();

  // Eyes
  ctx.shadowColor = "#ffd700";
  ctx.shadowBlur = 8;
  ctx.fillStyle = "#ffd700";
  ctx.beginPath(); ctx.arc(-5, -27 + bodyBob, 5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(5, -27 + bodyBob, 5, 0, Math.PI * 2); ctx.fill();
  ctx.shadowBlur = 0;

  const lookX = notes.length > 0 ? Math.sign(notes[0].lane - 1) * 1.5 : 0;
  ctx.fillStyle = "#1a1a2e";
  ctx.beginPath(); ctx.arc(-4 + lookX, -27 + bodyBob, 2.5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(6 + lookX, -27 + bodyBob, 2.5, 0, Math.PI * 2); ctx.fill();

  ctx.fillStyle = "#ff9933";
  ctx.beginPath(); ctx.moveTo(-2, -22 + bodyBob); ctx.lineTo(0, -17 + bodyBob); ctx.lineTo(2, -22 + bodyBob); ctx.fill();

  ctx.restore();
}

// ============================================================
// UI
// ============================================================
function updateUI() {
  document.getElementById("score").textContent = state.score;
  document.getElementById("level-num").textContent = state.level;
  document.getElementById("lives").textContent = state.lives;

  const comboEl = document.getElementById("combo-display");
  if (state.combo >= 3) {
    const multi = Math.min(1 + Math.floor(state.combo / 5), 4);
    comboEl.textContent = `🔥 ${state.combo} COMBO ×${multi}`;
    comboEl.classList.add("visible");
  } else {
    comboEl.classList.remove("visible");
  }

  const wordBar = document.getElementById("word-bar");
  wordBar.innerHTML = "";
  for (let i = 0; i < state.word.length; i++) {
    const div = document.createElement("div");
    div.className = "word-letter" + (state.collectedLetters[i] ? " got" : "");
    div.textContent = state.word[i];
    wordBar.appendChild(div);
  }
}

// ============================================================
// LEVEL FLOW
// ============================================================
function winLevel() {
  state.gameRunning = false;
  const overlay = document.getElementById("screen-overlay");
  overlay.classList.remove("hidden");

  const starsCount = state.lives >= 4 ? 3 : state.lives >= 2 ? 2 : 1;
  state.level++;

  overlay.innerHTML = `
    <div class="big-icon">🦉🎧</div>
    <div class="stars">${"⭐".repeat(starsCount)}${"☆".repeat(3 - starsCount)}</div>
    <h1>Brawo! Słowo: ${state.word}!</h1>
    <div class="subtitle">Wynik: ${state.score} · Max combo: ${state.maxCombo}</div>
    <div id="level-info">Następny: Poziom ${state.level} — szybszy beat!</div>
    <button class="start-btn" id="start-btn">🎵 Następna piosenka!</button>
    <button class="back-btn-overlay" onclick="goBack()">← Wróć do menu</button>
    <div class="key-hint">Klawisze: A / S / D lub dotyk</div>
  `;

  document.getElementById("start-btn").onclick = startLevel;
}

function gameOver() {
  state.gameRunning = false;
  const overlay = document.getElementById("screen-overlay");
  overlay.classList.remove("hidden");

  overlay.innerHTML = `
    <div class="big-icon">🦉😢</div>
    <h1>Koniec koncertu!</h1>
    <div class="subtitle">Wynik: ${state.score} · Max combo: ${state.maxCombo}</div>
    <div id="level-info">Udało się do poziomu ${state.level}</div>
    <button class="start-btn" id="start-btn">🎵 Jeszcze raz!</button>
    <button class="back-btn-overlay" onclick="goBack()">← Wróć do menu</button>
    <div class="key-hint">Klawisze: A / S / D lub dotyk</div>
  `;

  state.level = 1;
  state.score = 0;
  state.maxCombo = 0;

  document.getElementById("start-btn").onclick = startLevel;
}

function startLevel() {
  initAudio();

  const poolIdx = Math.min(Math.floor((state.level - 1) / 3), WORDS.length - 1);
  state.word = WORDS[poolIdx][Math.floor(Math.random() * WORDS[poolIdx].length)];
  state.collectedLetters = new Array(state.word.length).fill(false);
  state.lives = 5;
  state.combo = 0;
  state.gameRunning = true;

  notes = [];
  particles = [];
  nextNoteTime = Date.now() + 1000;
  beatStep = 0;
  lastBeatTime = 0;

  document.getElementById("screen-overlay").classList.add("hidden");
  updateUI();
}

// ============================================================
// GAME LOOP
// ============================================================
function gameLoop(now) {
  update(now);
  draw(now);
  requestAnimationFrame(gameLoop);
}

document.getElementById("start-btn").onclick = startLevel;
requestAnimationFrame(gameLoop);
</script>
